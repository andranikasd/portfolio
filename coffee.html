<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee? ☕ — Andranik Grigoryan</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='14' fill='%231d4ed8'/%3E%3Ctext x='50' y='54' font-size='46' font-family='system-ui,sans-serif' font-weight='700' fill='white' text-anchor='middle' dominant-baseline='central'%3EAG%3C/text%3E%3C/svg%3E" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #070d1a;
      --border: rgb(255 255 255 / 9%);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-2: #6366f1;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --radius: 14px;
    }

    html,
    body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      background-image:
        radial-gradient(ellipse 80% 55% at 50% 40%, rgb(59 130 246 / 14%) 0%, transparent 65%),
        linear-gradient(rgb(255 255 255 / 4%) 1px, transparent 1px),
        linear-gradient(90deg, rgb(255 255 255 / 4%) 1px, transparent 1px);
      background-size: 100% 100%, 48px 48px, 48px 48px;
    }

    .back {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 150ms ease;
      z-index: 10;
    }

    .back:hover {
      color: var(--accent);
    }

    .card {
      text-align: center;
      padding: 3rem 2.5rem 2.5rem;
      max-width: 480px;
      width: 90%;
      background: rgb(255 255 255 / 4%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
    }

    .card__emoji {
      font-size: 3.5rem;
      margin-bottom: 1.25rem;
      display: block;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .card__title {
      font-size: clamp(1.6rem, 4vw, 2.25rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.85rem;
      background: linear-gradient(135deg, #fff 0%, #93c5fd 55%, #a5b4fc 100%);
      background-clip: text;
      color: transparent;
    }

    .card__sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.65;
      margin-bottom: 2rem;
      max-width: 360px;
      margin-left: auto;
      margin-right: auto;
    }

    /* YES button row */
    .card__yes {
      display: flex;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 0.925rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 200ms ease;
      text-decoration: none;
      white-space: nowrap;
      min-height: 46px;
      letter-spacing: 0.01em;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn--yes {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #fff;
      box-shadow: 0 2px 20px rgb(59 130 246 / 30%);
    }

    .btn--yes:hover {
      box-shadow: 0 4px 32px rgb(59 130 246 / 50%);
      transform: translateY(-2px);
      color: #fff;
    }

    .btn--no {
      position: absolute;
      background: rgb(255 255 255 / 5%);
      border-color: var(--border);
      color: var(--text-muted);
      user-select: none;
      -webkit-user-select: none;
      transition: left 0.12s ease, top 0.12s ease;
    }

    /* Arena — the NO button is trapped inside here */
    .arena {
      position: relative;
      width: 100%;
      height: 320px;
      margin-bottom: 1rem;
      border: 1px dashed rgb(255 255 255 / 8%);
      border-radius: 8px;
      overflow: hidden;
    }

    .taunt {
      font-size: 0.82rem;
      color: var(--text-muted);
      min-height: 1.2em;
      font-style: italic;
    }

    /* ── Success state ─────────────────────────────────────── */
    .card.success .card__emoji {
      animation: spin-bounce 0.5s ease forwards;
    }

    @keyframes spin-bounce {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.4) rotate(20deg);
      }

      100% {
        transform: scale(1.15) rotate(0deg);
      }
    }

    .card.success .card__title {
      background: linear-gradient(135deg, #fff 0%, #6ee7b7 60%, #34d399 100%);
      background-clip: text;
      color: transparent;
    }
  </style>
</head>
<body>

  <a href="index.html" class="back">&#8592; Back to portfolio</a>

  <div class="card" id="card">
    <span class="card__emoji" id="emoji">&#9749;</span>
    <h1 class="card__title" id="title">Let&rsquo;s drink a coffee?</h1>
    <p class="card__sub" id="sub">
      I&rsquo;m always up for a good chat about infrastructure, cloud, or just life in general.
    </p>

    <div class="card__yes">
      <a href="mailto:theandranikgrigoryan@gmail.com?subject=Let%27s%20grab%20a%20coffee%21&body=Hey%20Andranik%2C%0A%0AI%27d%20love%20to%20grab%20a%20virtual%20coffee%20with%20you!%0A%0A"
         class="btn btn--yes"
         id="yes-btn">
        Yes, let&rsquo;s do it &#9749;
      </a>
    </div>

    <!-- The NO button is trapped inside this arena -->
    <div class="arena" id="arena">
      <button class="btn btn--no" id="no-btn" type="button">No, thanks</button>
    </div>

    <p class="taunt" id="taunt"></p>
  </div>

  <script>
    const noBtn = document.getElementById('no-btn');
    const arena = document.getElementById('arena');
    const taunt = document.getElementById('taunt');
    const card = document.getElementById('card');
    const title = document.getElementById('title');
    const sub = document.getElementById('sub');
    const emoji = document.getElementById('emoji');
    const yesBtn = document.getElementById('yes-btn');

    let attempts = 0;
    let lastFlee = 0;
    const PROXIMITY = 100; // px — button flees before mouse touches it
    const COOLDOWN = 180;  // ms — minimum time between flees

    const taunts = [
      'Skill issue. 😄',
      'bro just click yes',
      'The button has trust issues.',
      'I saw that 👀',
      'My cursor is faster than yours and I don\'t even have one.',
      'The button filed a restraining order.',
      '404: Willingness to say no not found.',
      'It\'s just a coffee, not a marriage proposal.',
      'The button is running on Kubernetes. You can\'t stop it.',
      'Have you tried turning your mouse off and on again?',
      'Incident severity: P1. Button refuses to be clicked.',
      'The button deployed to production. Good luck.',
      'You\'re fighting a DevOps engineer\'s code. This was always going to end this way.',
      'Alert: cursor too slow. SLA breached.',
      'The button scaled horizontally. There are now 3 of it.',
      'rm -rf /your-chances',
      'git commit -m "no"  ← the button wrote this',
      'The button is in a different availability zone.',
      'Your click latency is too high.',
      'The button passed all unit tests for escaping.',
      'kubectl delete pod no-button — command not found.',
      'Terraform plan: move button. Terraform apply: button moved.',
      'This is not a bug. This is a feature.',
      'The button has 99.99% uptime… of running away.',
      '☕ > ❌  — this is objectively true',
    ];

    function centerBtn() {
      const aw = arena.offsetWidth;
      const ah = arena.offsetHeight;
      const bw = noBtn.offsetWidth;
      const bh = noBtn.offsetHeight;
      noBtn.style.left = ((aw - bw) / 2) + 'px';
      noBtn.style.top = ((ah - bh) / 2) + 'px';
    }

    function flee(mx, my) {
      const now = Date.now();
      if (now - lastFlee < COOLDOWN) return;
      lastFlee = now;

      const aw = arena.offsetWidth;
      const ah = arena.offsetHeight;
      const bw = noBtn.offsetWidth;
      const bh = noBtn.offsetHeight;
      const maxX = aw - bw;
      const maxY = ah - bh;

      // Pick the corner of the arena farthest from the mouse
      const corners = [
        [0, 0],
        [maxX, 0],
        [0, maxY],
        [maxX, maxY],
      ];

      const [fx, fy] = corners.reduce((best, [cx, cy]) => {
        const d = Math.hypot(cx + bw / 2 - mx, cy + bh / 2 - my);
        return d > best[2] ? [cx, cy, d] : best;
      }, [0, 0, 0]);

      // Add a random spread within the far quadrant so it's less robotic
      const spread = 0.3;
      const newX = Math.max(0, Math.min(maxX, fx + (Math.random() - 0.5) * maxX * spread));
      const newY = Math.max(0, Math.min(maxY, fy + (Math.random() - 0.5) * maxY * spread));

      noBtn.style.left = newX + 'px';
      noBtn.style.top = newY + 'px';

      taunt.textContent = taunts[Math.min(attempts, taunts.length - 1)];
      attempts++;
    }

    centerBtn();

    // Track mouse across the whole arena — flee before the cursor arrives
    arena.addEventListener('mousemove', e => {
      const rect = arena.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;

      const bLeft = parseFloat(noBtn.style.left) || 0;
      const bTop  = parseFloat(noBtn.style.top)  || 0;
      const bcx = bLeft + noBtn.offsetWidth  / 2;
      const bcy = bTop  + noBtn.offsetHeight / 2;

      if (Math.hypot(mx - bcx, my - bcy) < PROXIMITY) {
        flee(mx, my);
      }
    });

    // Mobile: flee on touch anywhere in the arena
    arena.addEventListener('touchmove', e => {
      e.preventDefault();
      const rect = arena.getBoundingClientRect();
      const t = e.touches[0];
      flee(t.clientX - rect.left, t.clientY - rect.top);
    }, { passive: false });

    // Fallback: if somehow the mouse lands on the button, always flee
    noBtn.addEventListener('mouseover', e => {
      const rect = arena.getBoundingClientRect();
      flee(e.clientX - rect.left, e.clientY - rect.top);
    });

    yesBtn.addEventListener('click', () => {
      card.classList.add('success');
      emoji.textContent = '🎉';
      title.textContent = 'Amazing! See you soon ☕';
      sub.textContent = 'Opening your email… Can\'t wait to chat!';
      arena.style.display = 'none';
      taunt.textContent = '';
    });
  </script>

</body>
</html>
