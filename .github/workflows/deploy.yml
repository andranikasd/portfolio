name: CI / Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow only one concurrent deployment; cancel in-flight runs
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── JOB 1: Validate ──────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate HTML (html5validator)
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: true
          log_level: WARNING

      - name: Lint CSS (stylelint)
        run: |
          npm install --save-dev stylelint stylelint-config-standard
          echo '{"extends":["stylelint-config-standard"]}' > .stylelintrc.json
          npx stylelint "assets/css/**/*.css" --max-warnings 0 || true

      - name: Check for broken internal links
        run: |
          # Simple grep-based check: hrefs that start with # must exist as ids
          echo "Checking internal anchor links..."
          grep -oP 'href="#\K[^"]+' index.html | while read anchor; do
            if ! grep -q "id=\"$anchor\"" index.html; then
              echo "BROKEN LINK: #$anchor not found as an id" && exit 1
            fi
          done
          echo "All internal links OK"

  # ── JOB 2: Deploy ────────────────────────────────────────
  deploy:
    name: Deploy
    needs: validate
    runs-on: ubuntu-latest
    # Only deploy on pushes to main, not on PRs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
